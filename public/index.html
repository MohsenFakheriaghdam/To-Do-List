<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My Task List</title>
		<link rel="stylesheet" href="../src/css/main.css" />
		<link rel="stylesheet" href="../src/css/Vazirmatn-font-face.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
	</head>
	<body>
		<div class="page-wrapper container">
			<!-- Header -->
			<header id="header-page" class="header">
				<!-- Header title -->
				<a href="#" class="header-title pointer">My Tasks</a>

				<!-- Mobile menu button -->
				<div class="mobile-menu-btn flex-center pointer">
					<img src="../assets/svg/menu 1.svg" alt="" />
				</div>

				<!-- Mobile menu -->
				<aside class="mobile-menu">
					<div class="mobile-menu__header">
						<div class="mobile-menu__close pointer">
							<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
								<rect x="0.75" y="0.75" width="20" height="20" rx="5" stroke="#2F0D0C" stroke-width="1.5" />
								<path d="M8.62894 12.8715L12.8716 8.62891" stroke="#2F0D0C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
								<path d="M8.62894 8.62894L12.8716 12.8716" stroke="#2F0D0C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
							</svg>
						</div>
						<div class="mobile-menu__account">
							<img class="user-img" src="../assets/img/user-img.png" alt="user-img" />
							<span class="mobile-menu__account-name">Mohsen</span>
							<span class="mobile-menu__account-email">mohsen@example.com</span>
						</div>
					</div>
					<div class="row"></div>
					<div class="mobile-menu__body">
						<div class="mobile-menu__links">
							<a href="#" class="flex-center mobile-menu__link pointer">
								<img src="/assets/svg/list-todo.svg" alt="" />
								<span>My Tasks</span>
							</a>
							<a href="#" class="flex-center mobile-menu__link pointer">
								<img src="/assets/svg/settings.svg" alt="" />
								<span>Settings</span>
							</a>
						</div>
					</div>
				</aside>

				<!-- Dark overlay backdrop for mobile menu -->
				<div class="overlay" id="overlay"></div>
			</header>
			<main id="main">
				<div class="form-continer flex-center">
					<form class="add-task flex-center">
						<input class="task-input" type="text" placeholder="Type your task hear... " />
						<button class="flex-center add-task__btn">
							<img src="/assets/svg/plus 1.svg" alt="plus-icon" />
							<span>Add</span>
						</button>
					</form>
				</div>

				<div class="task-contianer flex-center">
					<ul class="task-list">
						<li class="task">
							<div class="task-info">
								<div class="task-info__content flex-center gap-5">
									<input type="checkbox" class="task__check" />
									<p class="task__title">Taks One</p>
								</div>
								<div class="row"></div>
								<span class="task__createdAt">2026/6/6</span>
							</div>
							<div class="task-btns">
								<button class="task-btn pointer"><img src="/assets/svg/pencil 1.svg" alt="pencil" class="icon task-edit__icon" /></button>
								<button class="task-btn pointer"><img src="/assets/svg/trash 1.svg" class="icon task-trach__icon" alt="" /></button>
							</div>
						</li>
						<li class="task">
							<div class="task-info">
								<div class="task-info__content flex-center gap-5">
									<input type="checkbox" class="task__check" />
									<p class="task__title">Taks One</p>
								</div>
								<div class="row"></div>
								<span class="task__createdAt">2026/6/6</span>
							</div>
							<div class="task-btns">
								<button class="task-btn pointer"><img src="/assets/svg/pencil 1.svg" alt="pencil" class="icon task-edit__icon" /></button>
								<button class="task-btn pointer"><img src="/assets/svg/trash 1.svg" class="icon task-trach__icon" alt="" /></button>
							</div>
						</li>
						<li class="task">
							<div class="task-info">
								<div class="task-info__content flex-center gap-5">
									<input type="checkbox" class="task__check" />
									<p class="task__title">Taks One</p>
								</div>
								<div class="row"></div>
								<span class="task__createdAt">2026/6/6</span>
							</div>
							<div class="task-btns">
								<button class="task-btn pointer"><img src="/assets/svg/pencil 1.svg" alt="pencil" class="icon task-edit__icon" /></button>
								<button class="task-btn pointer"><img src="/assets/svg/trash 1.svg" class="icon task-trach__icon" alt="" /></button>
							</div>
						</li>
					</ul>
				</div>
			</main>
			<footer>
				<h2>footer</h2>
			</footer>
		</div>
		<script src="../src/js/app.js"></script>
	</body>
</html>
